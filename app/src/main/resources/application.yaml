spring:
  datasource:
    url: jdbc:postgresql//localhost:5432/java_tutorials?currentSchema=token_exchange
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    user:
      name: admin
      password: password
      roles: ADMIN
server:
  port: 8080
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG